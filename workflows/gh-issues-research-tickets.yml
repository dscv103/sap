name: "GitHub Issues: Research Task"
on:
  workflow_dispatch:
    inputs:
      num_issues:
        description: "Maximum number of issues to try and fetch"
        required: false
        type: string
        default: "10"
      assignee:
        description: "GitHub username to filter issues by assignee"
        required: false
        type: string
        default: ""
      label_research_needed:
        description: "Label indicating an issue needs research"
        required: false
        type: string
        default: "research-needed"
      label_in_progress:
        description: "Label to apply when research is in progress"
        required: false
        type: string
        default: "research-in-progress"
      label_in_review:
        description: "Label indicating research is complete and awaiting review (used for WIP count)"
        required: false
        type: string
        default: "research-in-review"
      working_subdir:
        description: "Subdirectory within the repo to run commands in (leave empty for root)"
        required: false
        type: string
        default: ""

jobs:
  fetch-issues:
    runs-on: self-hosted
    env:
      RESEARCH_WIP_LIMIT: 5
    outputs:
      issue_numbers: ${{ steps.fetch-issues.outputs.issue_numbers }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Check research-in-review WIP capacity"
        id: check-wip
        env:
          GH_TOKEN: ${{ secrets.COMPOUND_PAT }}
        run: |
          effective_assignee="${{ inputs.assignee || vars.DEFAULT_ASSIGNEE }}"
          review_json=$(
            gh issue list \
              --label "${{ inputs.label_in_review || 'research-in-review' }}" \
              --assignee "$effective_assignee" \
              --limit 100 \
              --state open \
              --repo ${{ github.repository }} \
              --json number \
              --jq '[.[].number]'
          )
          if [ $? -ne 0 ]; then
            echo "Error: Failed to query issues in review. Defaulting to no capacity."
            echo "review_count=999" >> "$GITHUB_OUTPUT"
            echo "available_slots=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          review_count=$(echo "$review_json" | jq 'length')
          if ! [[ "$review_count" =~ ^[0-9]+$ ]]; then
            echo "Error: Invalid count result. Defaulting to no capacity."
            echo "review_count=999" >> "$GITHUB_OUTPUT"
            echo "available_slots=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "review_count=$review_count" >> "$GITHUB_OUTPUT"
          available_slots=$((${{ env.RESEARCH_WIP_LIMIT }} - review_count))
          if [ "$available_slots" -lt 0 ]; then available_slots=0; fi
          echo "available_slots=$available_slots" >> "$GITHUB_OUTPUT"
          echo "::notice title=WIP Status::$review_count/${{ env.RESEARCH_WIP_LIMIT }} issues in review, $available_slots slots available"
          if [ "$available_slots" -le 1 ] && [ "$available_slots" -gt 0 ]; then
            echo "::warning title=Approaching WIP Limit::Only $available_slots slot(s) remaining before WIP limit"
          elif [ "$available_slots" -eq 0 ]; then
            echo "::warning title=WIP Limit Reached::No capacity for new issues (WIP limit: ${{ env.RESEARCH_WIP_LIMIT }})"
          fi

      - name: "Get researchable issues"
        id: fetch-issues
        env:
          GH_TOKEN: ${{ secrets.COMPOUND_PAT }}
        run: |
          effective_assignee="${{ inputs.assignee || vars.DEFAULT_ASSIGNEE }}"
          available_slots=${{ steps.check-wip.outputs.available_slots }}
          if [ "$available_slots" -eq 0 ]; then
            echo "WIP limit reached - no capacity for new issues"
            echo "issue_numbers=[]" >> "$GITHUB_OUTPUT"
          else
            max_issues=${{ inputs.num_issues || 10 }}
            fetch_limit=$( [ "$available_slots" -lt "$max_issues" ] && echo "$available_slots" || echo "$max_issues" )
            echo "Fetching up to $fetch_limit issues (capacity: $available_slots, requested: $max_issues)"
            issue_numbers=$(
              gh issue list \
                --label "${{ inputs.label_research_needed || 'research-needed' }}" \
                --assignee "$effective_assignee" \
                --limit "$fetch_limit" \
                --state open \
                --repo ${{ github.repository }} \
                --json number \
                --jq '[.[].number]'
            )
            echo "issue_numbers=${issue_numbers}" >> "$GITHUB_OUTPUT"
          fi

      - name: "Output issue numbers"
        run: echo ${{ steps.fetch-issues.outputs.issue_numbers }}

  research-issues:
    name: Research Issue #${{ matrix.issue_number }}
    needs: fetch-issues
    runs-on: self-hosted
    if: ${{ needs.fetch-issues.outputs.issue_numbers != '[]' && needs.fetch-issues.outputs.issue_numbers != '' }}
    strategy:
      fail-fast: false
      matrix:
        issue_number: ${{ fromJSON(needs.fetch-issues.outputs.issue_numbers) }}
    env:
      TICKET_FILE_PATH: thoughts/shared/tickets/${{ matrix.issue_number }}.md

    steps:
      - name: Setup issue worker
        uses: ./.github/actions/issue-worker-setup
        with:
          issue_number: ${{ matrix.issue_number }}
          ticket_file_path: ${{ env.TICKET_FILE_PATH }}
          github_token: ${{ secrets.COMPOUND_PAT }}
          thoughts_deploy_key: ${{ secrets.THOUGHTS_WRITE_DEPLOY_KEY }}
          working_subdir: ${{ inputs.working_subdir }}

      - name: Update issue status to 'research in progress'
        env:
          GH_TOKEN: ${{ secrets.COMPOUND_PAT }}
        run: |
          gh issue edit ${{ matrix.issue_number }} \
            --repo ${{ github.repository }} \
            --add-label "${{ inputs.label_in_progress || 'research-in-progress' }}" \
            --remove-label "${{ inputs.label_research_needed || 'research-needed' }}" \
            || echo "Warning: could not update labels (labels may not exist yet)"

      - name: Run research with opencode
        id: run-opencode-research
        run: |
          cd ${{ github.event.repository.name }}
          opencode run --format json --print-logs --agent "researcher" "$(cat <<'EOF'
          ${{ env.TICKET_FILE_PATH }}
          Start by reading the ticket and all of the comments.
          Pay extra attention to the comments - if you (LinearLayer/claude) are mentioned in a comment you should treat that comment as an instruction.
          Also check thoughts/shared/images/${{ matrix.issue_number }} for any relevant images and read any you find.
          Then proceed to research the codebase based on the instructions.

          **DO NOT ASK THE USER FOR DIRECTIONS OR CLARIFICATION. Simply proceed to the research based on the information you have been provided with, and then write your research document.**

          If there is already a research document for this issue and there are comments on the issue, use the comments as instructions for updating the research document.

          CRITICAL: After completing all your research and writing the document, your FINAL output must be EXACTLY in this format (nothing else):

          research completed - [thoughts/shared/YYYY-MM-DD-ISSUE-XXXX-description.md](https://github.com/${{ vars.THOUGHTS_REPO }}/blob/main/repos/${{ github.repository_owner }}/shared/research/YYYY-MM-DD-ISSUE-XXXX-description.md)

          ### open questions
          1. [First open question from your research document]
          2. [Second open question from your research document]
          3. [Continue for all open questions, or write "None at this time" if there are no open questions]

          Output ONLY this message as your final response, nothing else. Do not include any other text, explanations, or conversation before or after this format.
          EOF
          )" 2>&1 | tee OPENCODE_ANSWER.md

      - name: Sync research to thoughts
        run: |
          cd thoughts
          git add -A
          if git diff --cached --quiet; then echo "No changes to commit"; exit 0; fi
          git commit -m "Sync thoughts from CI for issue #${{ matrix.issue_number }}"
          git pull --rebase
          for i in {1..5}; do
            git push && break || {
              if [ $i -eq 5 ]; then echo "Failed to push after 5 attempts"; exit 1; fi
              echo "Push failed, attempt $i/5. Pulling and retrying..."
              git pull --rebase
              sleep 2
            }
          done

      - name: In event of failure — reset status
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.COMPOUND_PAT }}
        run: |
          gh issue edit ${{ matrix.issue_number }} \
            --repo ${{ github.repository }} \
            --add-label "${{ inputs.label_research_needed || 'research-needed' }}" \
            --remove-label "${{ inputs.label_in_progress || 'research-in-progress' }}" \
            || echo "Warning: could not reset labels"

      - name: In event of cancellation — reset status
        if: ${{ cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.COMPOUND_PAT }}
        run: |
          gh issue edit ${{ matrix.issue_number }} \
            --repo ${{ github.repository }} \
            --add-label "${{ inputs.label_research_needed || 'research-needed' }}" \
            --remove-label "${{ inputs.label_in_progress || 'research-in-progress' }}" \
            || echo "Warning: could not reset labels"

      - name: Update issue status to 'research in review'
        env:
          GH_TOKEN: ${{ secrets.COMPOUND_PAT }}
        run: |
          gh issue edit ${{ matrix.issue_number }} \
            --repo ${{ github.repository }} \
            --add-label "${{ inputs.label_in_review || 'research-in-review' }}" \
            --remove-label "${{ inputs.label_in_progress || 'research-in-progress' }}" \
            || echo "Warning: could not update labels"
